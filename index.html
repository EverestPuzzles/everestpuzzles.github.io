<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="dbGVjRHwz0TLsbcTTrkSU8XyVQTYcrqPcztXuCtZaCU" />
    
    <title>Everest Puzzles</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f1115;
            --surface: #16181f;
            --surface-2: #1e212b;
            --text: #e2e8f0;
            --text-sec: #94a3b8;
            --accent: #2dd4bf;
            --accent-dim: #0f766e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 1.5rem 6rem;
        }

        header {
            position: relative;
            text-align: center;
            margin-bottom: 5rem;
            padding: 12rem 2rem 12rem;
            background: var(--bg) url('https://play-lh.googleusercontent.com/LMDs_vJP-gpUxQ6JbaKrohPrgesqFaukgXSXYJQ12qegTd7KudieOyLf1Fq3rpS2cfM=w3840-h2160-rw') center/cover no-repeat;
            border-radius: 0 0 32px 32px;
            /* Soft curve at bottom */
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 17, 21, 0.65), rgba(15, 17, 21, 0.9) 60%);
            /* Stronger tint since the image has bright greens/blues — prevents text washout */
            z-index: 1;
        }

        header>* {
            position: relative;
            z-index: 2;
        }

        h1 {
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.8);
            font-size: clamp(4rem, 14vw, 8rem);
            font-family: "Playfair Display";
        }

        .tagline {
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
            font-size: 1.5rem;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: white;
            margin: 4rem 0 2.5rem;
            text-align: center;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
        }

        .app-card {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--surface-2);
            transition: all 0.25s ease;
            box-shadow: 0 10px 30px -12px rgba(0, 0, 0, 0.4);
        }

        .app-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -16px rgba(0, 0, 0, 0.5);
            border-color: var(--accent-dim);
        }

        .app-content {
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }

        .app-logo {
            width: 96px;
            height: 96px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.4),
                0 2px 8px rgba(0, 0, 0, 0.3);
            margin: 0 auto 1.4rem;
            display: block;
            transition: transform 0.25s ease;
        }

        .app-card:hover .app-logo {
            transform: scale(1.08);
        }

        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .app-title {
            font-size: 1.85rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: white;
        }

        .app-desc {
            font-size: 1.05rem;
            color: var(--text-sec);
            margin-bottom: 1.8rem;
            line-height: 1.65;
        }

        .store-badge {
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .store-badge:hover {
            transform: scale(1.06);
        }

        .store-badge img {
            height: 64px;
            width: auto;
        }

        footer {
            margin-top: 8rem;
            padding: 3rem 1.5rem 2rem;
            text-align: center;
            border-top: 1px solid var(--surface-2);
            color: var(--text-sec);
            font-size: 0.95rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            text-decoration: underline;
            color: #5eead4;
        }

        @media (max-width: 600px) {
            .container {
                padding: 3rem 1.2rem 5rem;
            }

            h1 {
                font-size: clamp(3rem, 10vw, 5rem);
            }

            h2 {
                font-size: 2.4rem;
            }

            .app-logo {
                width: 88px;
                height: 88px;
                border-radius: 22px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>Everest<span> Puzzles</span></h1>
            <p class="tagline">
                Creating thoughtful apps, games and experiences that help you relax, focus, and sharpen your mind.
            </p>
        </header>

        <h2>Featured Apps</h2>

        <div class="apps-grid">

            <div class="app-card">
                <div class="app-content">
                    <div class="app-logo">
                        <img src="https://play-lh.googleusercontent.com/NwyaOed-PkCeQTjPtVj1I7zG62GM6DydMEllmFa0b9XXj2BlN_TraAVYO-V7wIe2wxOdKFVBklnFgoj_mtf0gdY=w512-rw" alt="Skill Sudoku App Icon">
                    </div>
                    <div class="app-title">Skill Sudoku</div>
                    <p class="app-desc">
                        Classic Sudoku in a clean, distraction-free design — built for deep focus and flow state.
                    </p>
                    <a href="https://play.google.com/store/apps/details?id=com.krish.skillsudoku&hl=en_GB&pli=1" class="store-badge" target="_blank" rel="noopener">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
                    </a>
                </div>
            </div>
        </div>

    </div>

    <footer>
        <p><strong>Everest Puzzles</strong><br>
            <a href="mailto:krl.developer1@gmail.com">krl.developer1@gmail.com</a>
        </p>
    </footer>

</body>

</html>
